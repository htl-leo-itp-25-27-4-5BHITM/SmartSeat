<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Seat</title>
    <script>
        let timestamp = new Date().getTime();
        let link = document.createElement('link');
        link.rel = 'stylesheet';
        let script = document.createElement('script');
        script.defer = true;
        let favicon = document.createElement('link');
        favicon.rel = 'icon';
        favicon.type = 'image/png';

        link.href = './styles/style.css' + `?${timestamp}`;
        script.src = './scripts/script.js' + `?${timestamp}`;
        favicon.href = './assets/img/favicon.ico?' + timestamp;

        document.head.appendChild(link);
        document.head.appendChild(script);
        document.head.appendChild(favicon);
    </script>
</head>

<body>

<!-- NAV -->
<header id="nav">
    <div id="nav-left">
        <img src="./assets/img/logo.png" alt="logo">
        <h1>Smart Seat</h1>
    </div>

    <div id="btns">
        <button onclick="loadView(1)">Map</button>
        <button onclick="loadView(2)">List</button>
    </div>
</header>


<main id="main1">
    <div id="floor-box">
        <div class="floors" onclick="loadFloor(1)">
            <h2>1.OG</h2>
            <p id="count1"></p>
            <img id="selected1" src="./assets/img/selected.png">
        </div>

        <div class="floors" onclick="loadFloor(2)">
            <h2>2.OG</h2>
            <p id="count2"></p>
            <img id="selected2" src="./assets/img/selected.png">
        </div>
    </div>

    <div id="map">
        <div class="koje" id="k1"></div>
        <div class="koje" id="k2"></div>
        <div class="koje" id="k3"></div>
        <div class="koje" id="k4"></div>
        <div class="koje" id="k5"></div>
        <div id="seat-tooltip"></div>
    </div>

</main>

<main2 id="main2">
    <div id="entries">
        <div class="koje-entry">
            <div class="infos-entry">
                <h1 id="name1">Koje 1</h1>
                <p>1.OG - linker Flügel</p>
            </div>
            <div>
                <div class="koje2" id="e1"></div>
            </div>
        </div>

        <div class="koje-entry">
            <div class="infos-entry">
                <h1 id="name2">Koje 2</h1>
                <p>1.OG - rechter Flügel</p>
            </div>
            <div>
                <div class="koje2" id="e2"></div>
            </div>
        </div>

        <div class="koje-entry">
            <div class="infos-entry">
                <h1 id="name3">Koje 3</h1>
                <p>1.OG - rechter Flügel</p>
            </div>
            <div>
                <div class="koje2" id="e3"></div>
            </div>
        </div>

        <div class="koje-entry">
            <div class="infos-entry">
                <h1 id="name4">Koje 4</h1>
                <p>2.OG - linker Flügel</p>
            </div>
            <div>
                <div class="koje2" id="e4"></div>
            </div>
        </div>

        <div class="koje-entry">
            <div class="infos-entry">
                <h1 id="name5">Koje 5</h1>
                <p>2.OG - rechter Flügel</p>
            </div>
            <div>
                <div class="koje2" id="e5"></div>
            </div>
        </div>
    </div>
</main2>

<div id="occupied-info"></div>


<main3>
    <canvas id="myChart" style="width:100%;max-width:700px">

</main3>


</body>

</html>
