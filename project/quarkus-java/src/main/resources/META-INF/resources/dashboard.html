<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Seat Dashboard</title>
    <script>
        let timestamp = new Date().getTime();
        let link = document.createElement('link');
        link.rel = 'stylesheet';
        let script = document.createElement('script');
        script.defer = true;
        let favicon = document.createElement('link');
        favicon.rel = 'icon';
        favicon.type = 'image/png';

        link.href = './styles/dashboard.css' + `?${timestamp}`;
        script.src = './scripts/dashboard.js' + `?${timestamp}`;
        favicon.href = './assets/img/favicon.ico?' + timestamp;

        document.head.appendChild(link);
        document.head.appendChild(script);
        document.head.appendChild(favicon);
    </script>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div id="login-box">
        <img src="./assets/img/logo.png" alt="logo">

        <h2>Smart Seat Login</h2>

        <input
                type="text"
                id="username"
                placeholder="Benutzername"
        >

        <input
                type="password"
                id="password"
                placeholder="Passwort"
        >

        <button onclick="login()">
            Login
        </button>

        <p id="login-error"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="app" style="display: none;">

    <header id="nav">
        <div id="nav-left">
            <img src="./assets/img/logo.png" alt="logo">
            <h1>Dashboard</h1>
        </div>
    </header>

    <main id="dashboard">

        <section id="section1">
        </section>

        <section id="section2">
            <h2 class="panel-title">Dauer</h2>

            <input
                    type="number"
                    min="11"
                    max="100"
                    id="duration"
                    onchange="activateButton()"
            >

            <button
                    disabled
                    id="duration-button"
                    onclick="updateDuration()"
            >
                Speichern
            </button>
        </section>

        <section id="section3">
            <h2 class="panel-title">Leaderboard</h2>
        </section>

    </main>

    <div id="changed-info"></div>
</div>

</body>
</html>
